<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Placement Predictor</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../static/css/style.css" />
  </head>

  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-10 col-md-12">
          <div class="card p-4">
            <div class="card-header">🚀 Job Placement Predictor</div>

            <div class="card-body">
              <form method="POST">
                <div class="row g-3">
                  <!-- Gender -->
                  <div class="col-md-6">
                    <label class="form-label">Gender</label>
                    <select class="form-select" name="gender">
                      {% for g in gender %}
                      <option value="{{g.value}}">{{g.label}}</option>
                      {% endfor %}
                    </select>
                  </div>

                  <!-- SSC % -->
                  <div class="col-md-6">
                    <label class="form-label">SSC %</label>
                    <input
                      type="number"
                      step="0.01"
                      name="ssc_percentage"
                      class="form-control"
                      placeholder="Enter SSC %"
                    />
                  </div>

                  <!-- SSC Board -->
                  <div class="col-md-6">
                    <label class="form-label">SSC Board</label>
                    <select class="form-select" name="ssc_board">
                      {% for ssc in ssc_board %}
                      <option value="{{ssc}}">{{ssc}}</option>
                      {% endfor %}
                    </select>
                  </div>

                  <!-- HSC % -->
                  <div class="col-md-6">
                    <label class="form-label">HSC %</label>
                    <input
                      type="number"
                      step="0.01"
                      name="hsc_percentage"
                      class="form-control"
                      placeholder="Enter HSC %"
                    />
                  </div>

                  <!-- HSC Board -->
                  <div class="col-md-6">
                    <label class="form-label">HSC Board</label>
                    <select class="form-select" name="hsc_board">
                      {% for hsc in hsc_board %}
                      <option value="{{hsc}}">{{hsc}}</option>
                      {% endfor %}
                    </select>
                  </div>

                  <!-- HSC Subject -->
                  <div class="col-md-6">
                    <label class="form-label">HSC Subject</label>
                    <select class="form-select" name="hsc_subject">
                      {% for hsc_s in hsc_subject %}
                      <option value="{{hsc_s}}">{{hsc_s}}</option>
                      {% endfor %}
                    </select>
                  </div>

                  <!-- Degree % -->
                  <div class="col-md-6">
                    <label class="form-label">Degree %</label>
                    <input
                      type="number"
                      step="0.01"
                      name="degree_percentage"
                      class="form-control"
                      placeholder="Enter Degree %"
                    />
                  </div>

                  <!-- Degree -->
                  <div class="col-md-6">
                    <label class="form-label">Degree</label>
                    <select class="form-select" name="undergrad_degree">
                      {% for degree in undergrad_degree %}
                      <option value="{{degree.value}}">{{degree.label}}</option>
                      {% endfor %}
                    </select>
                  </div>

                  <!-- Work Experience -->
                  <div class="col-md-6">
                    <label class="form-label">Work Experience</label>
                    <select class="form-select" name="work_experience">
                      {% for exp in work_experience %}
                      <option value="{{exp}}">{{exp}}</option>
                      {% endfor %}
                    </select>
                  </div>

                  <!-- Test % -->
                  <div class="col-md-6">
                    <label class="form-label">Employee Test %</label>
                    <input
                      type="number"
                      step="0.01"
                      name="emp_test_percentage"
                      class="form-control"
                      placeholder="Enter Employee Test %"
                    />
                  </div>

                  <!-- Specialization -->
                  <div class="col-md-6">
                    <label class="form-label">Specialization</label>
                    <select class="form-select" name="specialisation">
                      {% for spec in specialisation %}
                      <option value="{{spec.value}}">{{spec.label}}</option>
                      {% endfor %}
                    </select>
                  </div>

                  <!-- MBA % -->
                  <div class="col-md-6">
                    <label class="form-label">MBA %</label>
                    <input
                      type="number"
                      step="0.01"
                      name="mba_percent"
                      class="form-control"
                      placeholder="Enter MBA %"
                    />
                  </div>
                </div>

                <div class="mt-4 d-grid">
                  <button
                    type="submit"
                    class="btn btn-primary"
                    onclick="sendData(event)"
                  >
                    🔍 Predict Placement
                  </button>
                </div>
              </form>
              <br />
              <div class="row">
                <div class="col-12" style="text-align: center">
                  <h4><span id="prediction"></span></h4>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function sendData(e) {
        e.preventDefault();

        var formData = new FormData(document.querySelector("form"));
        // For debugging
        const data = Object.fromEntries(formData.entries());
        console.log(data);

        document.getElementById('prediction').innerHTML = "Waiting For Prediction..."
        fetch("/predict", {
          method: "POST",
          body: formData,
        })
          .then((response) => response.text())
          .then((result) => {
            document.getElementById('prediction').innerHTML = result
          });
      }
    </script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
